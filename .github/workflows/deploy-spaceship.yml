name: Deploy to Spaceship cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload website to Spaceship
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy static site by FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SPACESHIP_FTP_SERVER }}
          username: ${{ secrets.SPACESHIP_FTP_USERNAME }}
          password: ${{ secrets.SPACESHIP_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./
          server-dir: ${{ secrets.SPACESHIP_FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            functions/**
            blog-cms/**
            docs/**
            tools/**
            scripts/**
            backups/**
            reports/**
            firebase-default-hosting-minimal/**
            canonical-html-fix-package/**
            htaccess-www-to-apex-package/**
            og-jsonld-host-fix-package/**
            eden-pos-apk/**
            admin/**
            .firebase/**
            *.zip
            *.log
            README.md
            firebase.json
            firestore.rules
            firestore.indexes.json
            storage.rules
            .firebaserc
            package.json
            package-lock.json
            db_en.js
            db_en.json
