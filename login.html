<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | Eden Cafe</title>
    <meta name="description" content="เข้าสู่ระบบสมาชิก Eden Cafe ด้วย Google เบอร์โทรศัพท์ หรืออีเมล">
    <link rel="icon" type="image/webp" href="Images/Logo.webp">
    <link rel="stylesheet" href="style.css?v=mobile-layout-20260620-7">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar" style="background-color: #fff;">
        <div class="container">
            <a href="/" class="logo">
                <img src="Images/Logo.webp" alt="Eden Cafe Logo" class="logo-img">
            </a>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="/">หน้าแรก</a></li>
                    <li><a href="/menu">เมนู</a></li>
                    <li><a href="/shop">ร้านค้า</a></li>
                    <li class="nav-dropdown">
                        <a class="nav-dropdown-toggle" href="/booking" aria-haspopup="true">
                            ระบบจอง <span class="nav-dropdown-caret" aria-hidden="true"></span>
                        </a>
                        <ul class="nav-dropdown-menu" aria-label="ตัวเลือกระบบจอง">
                            <li><a href="/booking?type=room">ห้องประชุม</a></li>
                            <li><a href="/booking?type=table">โต๊ะ</a></li>
                            <li><a href="/archery/">ยิงธนู</a></li>
                        </ul>
                    </li>
                    <li><a href="/faq">คำถามที่พบบ่อย</a></li>
                </ul>
            </nav>
            <div class="nav-actions">
                <a href="/checkout" class="global-cart-icon" aria-label="Cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="global-cart-badge" id="global-cart-badge" style="display: none;">0</span>
                </a>
                <div class="auth-container"></div>
            </div>
        </div>
    </header>

    <main class="auth-page">
        <section class="auth-panel" aria-label="Login form">
            <div class="auth-brand">
                <img src="Images/Logo.webp" alt="Eden Cafe Logo">
                <p class="register-eyebrow">Eden Cafe Membership</p>
                <h1>เข้าสู่ระบบ</h1>
            </div>

            <div class="register-status" id="login-status" role="status" aria-live="polite"></div>

            <div class="auth-social-entry">
                <button class="google-login-btn auth-google-btn" type="button" id="login-google">
                    เข้าสู่ระบบด้วย Google
                </button>
                <p class="phone-login-note">ถ้าเป็นครั้งแรก ระบบจะพาไปตั้งรหัสผ่านสำหรับ Email Login</p>
                <div class="auth-divider"><span>หรือเข้าสู่ระบบด้วยเบอร์/อีเมล</span></div>
            </div>

            <form class="auth-form" id="login-form">
                <label>
                    <span>เบอร์โทรศัพท์หรืออีเมล</span>
                    <input id="login-identifier" name="identifier" type="text" autocomplete="username"
                        placeholder="08X-XXX-XXXX หรือ name@example.com" required>
                </label>
                <label>
                    <span>รหัสผ่าน</span>
                    <input id="login-password" name="password" type="password" autocomplete="current-password"
                        minlength="8" maxlength="128" placeholder="รหัสผ่านของคุณ" required>
                </label>
                <button class="btn register-submit" id="login-submit" type="submit">เข้าสู่ระบบ</button>
                <button class="auth-forgot-link" id="forgot-password-open" type="button">ลืมรหัสสมาชิก?</button>
            </form>

            <div class="forgot-password-panel" id="forgot-password-panel" hidden>
                <div class="forgot-password-head">
                    <h2>ลืมรหัสสมาชิก</h2>
                    <button class="auth-close-button" id="forgot-password-close" type="button" aria-label="ปิด">ปิด</button>
                </div>

                <form class="auth-form forgot-form" id="forgot-request-form">
                    <fieldset class="forgot-channel-group">
                        <legend>เลือกช่องทางรับ OTP</legend>
                        <label>
                            <input type="radio" name="forgot-channel" value="phone" checked>
                            <span>เบอร์โทรศัพท์</span>
                        </label>
                        <label>
                            <input type="radio" name="forgot-channel" value="email">
                            <span>อีเมล</span>
                        </label>
                    </fieldset>
                    <label>
                        <span id="forgot-identifier-label">เบอร์โทรศัพท์</span>
                        <input id="forgot-identifier" name="identifier" type="text" autocomplete="username"
                            placeholder="08X-XXX-XXXX" required>
                    </label>
                    <button class="btn register-submit" id="forgot-request-submit" type="submit">ส่ง OTP</button>
                    <div class="register-recaptcha" id="forgot-recaptcha-container"></div>
                </form>

                <form class="auth-form forgot-form" id="forgot-complete-form" hidden>
                    <label>
                        <span>OTP</span>
                        <input id="forgot-otp" name="otp" type="text" inputmode="numeric" autocomplete="one-time-code"
                            minlength="6" maxlength="6" placeholder="กรอกรหัส 6 หลัก" required>
                    </label>
                    <label>
                        <span>รหัสผ่านใหม่</span>
                        <input id="forgot-password" name="password" type="password" autocomplete="new-password"
                            minlength="8" maxlength="128" placeholder="อย่างน้อย 8 ตัวอักษร" required>
                    </label>
                    <label>
                        <span>ยืนยันรหัสผ่านใหม่</span>
                        <input id="forgot-password-confirm" name="confirmPassword" type="password"
                            autocomplete="new-password" minlength="8" maxlength="128" placeholder="กรอกรหัสผ่านอีกครั้ง" required>
                    </label>
                    <button class="btn register-submit" id="forgot-complete-submit" type="submit">รีเซ็ตรหัสผ่าน</button>
                </form>
            </div>

            <p class="auth-switch">
                ยังไม่มีบัญชี? <a href="/register">สมัครสมาชิก</a>
            </p>
        </section>
    </main>

    <script>
        const menu = document.querySelector('#mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        const navActions = document.querySelector('.nav-actions');
        if (menu) {
            menu.addEventListener('click', function () {
                menu.classList.toggle('is-active');
                navLinks.classList.toggle('active');
                navActions.classList.toggle('active');
            });
            document.querySelectorAll('.nav-links a').forEach(item => {
                item.addEventListener('click', () => {
                    menu.classList.remove('is-active');
                    navLinks.classList.remove('active');
                    navActions.classList.remove('active');
                });
            });
        }
    </script>
    <script type="module" src="js/login.js?v=phone-reset-firebase-20260605"></script>
    <script type="module" src="js/auth.js?v=mobile-login-slot-20260620-1"></script>
</body>
</html>
