<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <link rel="canonical" href="https://edencafe.co/">
  <title>Eden Cafe Official Website</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #173326;
      --muted: #5c7064;
      --line: #dce7df;
      --accent: #2f7d4b;
      --paper: #f8fbf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      border: 1px solid var(--line);
      background: #fff;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.65;
    }

    a {
      display: inline-block;
      color: #fff;
      background: var(--accent);
      padding: 12px 18px;
      text-decoration: none;
      font-weight: 700;
    }

    small {
      display: block;
      margin-top: 18px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Eden Cafe Official Website</h1>
    <p>
      This Firebase default domain is kept only for Eden Cafe backend and
      authentication support. The public website is available at the main domain.
    </p>
    <a href="https://edencafe.co/" rel="canonical">Open edencafe.co</a>
    <small>No automatic redirect is used here so Firebase Auth helper routes remain safe.</small>
  </main>
</body>
</html>
